<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sauvageonne Mégève — P&L</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#0b0b12;color:#c8c8d0;padding:12px;font-size:11px;-webkit-font-smoothing:antialiased}
#app{max-width:1200px;margin:0 auto}
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.btn{padding:7px 11px;border-radius:6px;cursor:pointer;border:1px solid #252530;background:#12121a;color:#6b6b78;font-size:11px;font-family:inherit;user-select:none;transition:all .12s}
.btn.on{background:#4ecdc4;color:#0b0b12;border-color:#4ecdc4;font-weight:600}
.btn:hover:not(.on){border-color:#555;color:#aaa}
input[type=range]{-webkit-appearance:none;flex:1;height:6px;background:#252530;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:#4ecdc4;border-radius:50%;cursor:pointer}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.kc{background:#12121a;border:1px solid #252530;border-radius:8px;padding:10px 12px}
.kt{font-size:9px;color:#6b6b78;text-transform:uppercase;letter-spacing:.4px}
.kv{font-size:20px;font-weight:700;margin:2px 0}
.ks{font-size:9px;color:#6b6b78}
.sbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#12121a;border-radius:8px;border:1px solid #252530;margin-bottom:8px}
.g{color:#51cf66 !important}.r{color:#ff6b6b !important}.dd{color:#555 !important}
.hi{color:#f0f0f5;font-weight:600}.lo{color:#666}
.foot{margin-top:10px;font-size:9px;color:#444;text-align:center}

/* === DESKTOP TABLE === */
.dtbl{width:100%;border-collapse:collapse;background:#12121a;border-radius:8px;overflow:hidden;border:1px solid #252530}
.dtbl th,.dtbl td{padding:5px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid #1a1a25;font-size:11px}
.dtbl th{color:#6b6b78;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;background:#12121a;z-index:2}
.dtbl td:first-child,.dtbl th:first-child{text-align:left;position:sticky;left:0;background:#12121a;z-index:1;min-width:160px}
.dtbl th:first-child{z-index:3}
.dtbl .sep{border-left:2px solid #4ecdc4}
.tr-rev td{color:#4ecdc4;font-weight:600}
.tr-sub td{color:#f0f0f5;font-weight:600;border-top:2px solid #252530}
.tr-tot td{color:#ffd43b;font-weight:700;border-top:2px solid #4ecdc4;border-bottom:2px solid #4ecdc4;background:#0f0f18}
.tr-det td{color:#555;font-size:10px}
.tr-det td:first-child{padding-left:18px}

/* === MOBILE CARDS === */
.mwrap{background:#12121a;border-radius:8px;border:1px solid #252530;overflow:hidden}
.rw{padding:7px 10px;border-bottom:1px solid #1a1a25}
.rl{font-size:11px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ln{display:flex;align-items:center;font-size:11px;padding:1px 0;gap:4px}
.tg{font-size:8px;font-weight:600;padding:1px 5px;border-radius:3px;min-width:22px;text-align:center}
.va{text-align:right;flex:1}.pe{text-align:right;min-width:46px;font-size:10px}
.c-rev .rl{color:#4ecdc4;font-weight:600}
.c-sub{border-top:2px solid #252530}.c-sub .rl{color:#f0f0f5;font-weight:600}
.c-tot{border-top:2px solid #4ecdc4;border-bottom:2px solid #4ecdc4;background:#0f0f18}.c-tot .rl{color:#ffd43b;font-weight:700}
.c-det .rl{color:#555;font-size:10px;padding-left:6px}.c-det .ln{font-size:10px}

/* === RESPONSIVE === */
#desktop{display:none}
#mobile{display:block}
@media(min-width:768px){
  #desktop{display:block}
  #mobile{display:none}
  .kgrid{grid-template-columns:repeat(4,1fr)}
  .chips-cmp{display:none}
}
@media(max-width:767px){
  .kgrid{grid-template-columns:1fr 1fr}
  .kv{font-size:17px}
}
</style>
</head>

  <button class="btn" id="detBtn">▸ Détail</button>

<div class="chips chips-cmp">

<div class="sbar" id="sbar">

<div id="desktop" style="overflow:auto;border-radius:8px"></div>

<!-- Mobile: stacked cards -->

function fm(v){if(!v)return"-";var a=Math.abs(Math.round(v)).toLocaleString("fr-FR");return v<0?"("+a+")":a}
function fk(v){if(!v)return"-";var a=Math.abs(Math.round(v/1000)).toLocaleString("fr-FR");return v<0?"("+a+")":a}
function fp(v){if(v==null||!isFinite(v))return"-";var a=Math.abs(v*100).toFixed(1)+"%";return v<0?"("+a+")":"+"+a}
function ff(v){return unit==="K€"?fk(v):fm(v)}
function cum(a,m){var s=0;for(var i=0;i<=m;i++)s+=a[i];return s}
function gv(ds,i){var r=D[ds]?D[ds][i]:null;if(!r)return 0;var v=r[2];if(mode==="cumul")return cum(v,mo);if(mode==="total")return v[12];return v[mo]}

    h+='<div class="rw '+mcc(cat)+'"><div class="rl">'+sl+'</div>';
    if(cmp==="all"){
      h+='<div class="ln"><span class="tg" style="background:#1e3a38;color:#4ecdc4">N</span><span class="va hi">'+ff(vN)+'</span></div>';
      h+='<div class="ln"><span class="tg" style="background:#1a1a2a;color:#666">N-1</span><span class="va lo">'+ff(vN1)+'</span><span class="pe '+eN1+'">'+fp(pN1)+'</span></div>';
      h+='<div class="ln"><span class="tg" style="background:#2a2a1a;color:#ffa94d">B</span><span class="va lo">'+ff(vB)+'</span><span class="pe '+eB2+'">'+fp(pB)+'</span></div>';
    } else if(cmp==="n1"){
      h+='<div class="ln"><span class="lo" style="flex:1">'+ff(vN1)+'</span><span class="hi" style="flex:1;text-align:right">'+ff(vN)+'</span><span class="pe '+eN1+'" style="font-weight:500">'+ff(dN1)+'</span><span class="pe '+eN1+'">'+fp(pN1)+'</span></div>';
    } else {
      h+='<div class="ln"><span style="color:#ffa94d;flex:1">'+ff(vB)+'</span><span class="hi" style="flex:1;text-align:right">'+ff(vN)+'</span><span class="pe '+eB2+'" style="font-weight:500">'+ff(dB)+'</span><span class="pe '+eB2+'">'+fp(pB)+'</span></div>';
    }
    h+='</div>';
  }
  h+='</div>';
  document.getElementById("mobile").innerHTML=h;
  document.getElementById("foot").textContent="N-1 retraité (dot. amort. & rés. fin.) · Montants HT "+unit+" · Vert = favorable · Rouge = défavorable";
}

document.querySelectorAll("[data-mode]").forEach(function(b){b.addEventListener("click",function(){mode=this.dataset.mode;draw()})});
document.querySelectorAll("[data-unit]").forEach(function(b){b.addEventListener("click",function(){unit=this.dataset.unit;draw()})});
document.querySelectorAll("[data-cmp]").forEach(function(b){b.addEventListener("click",function(){cmp=this.dataset.cmp;draw()})});
document.getElementById("detBtn").addEventListener("click",function(){det=!det;draw()});
document.getElementById("sl").addEventListener("input",function(){mo=+this.value;draw()});

draw();
</script>

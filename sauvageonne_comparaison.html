<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sauvageonne Mégève — P&L Comparatif</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono',monospace;background:#0b0b12;color:#c8c8d0;min-height:100vh;padding:10px;font-size:11px;-webkit-font-smoothing:antialiased;max-width:480px;margin:0 auto}
.c{display:flex;gap:4px;flex-wrap:wrap}
.b{padding:7px 11px;border-radius:6px;cursor:pointer;border:1px solid #252530;background:#12121a;color:#6b6b78;font-size:11px;font-family:inherit;-webkit-tap-highlight-color:transparent;user-select:none;transition:all .12s}
.b.on{background:#4ecdc4;color:#0b0b12;border-color:#4ecdc4;font-weight:600}
.b:active{transform:scale(.96)}
input[type=range]{-webkit-appearance:none;flex:1;height:6px;background:#252530;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:#4ecdc4;border-radius:50%;cursor:pointer}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.k{background:#12121a;border:1px solid #252530;border-radius:8px;padding:10px 12px}
.kt{font-size:9px;color:#6b6b78;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.kv{font-size:20px;font-weight:700}
.ks{font-size:9px;color:#6b6b78;margin-top:1px}
.slider{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#12121a;border-radius:8px;border:1px solid #252530;margin-bottom:8px}
.rw{padding:7px 10px;border-bottom:1px solid #1a1a25}
.rw:active{background:#1a1a25}
.rl{font-size:11px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:1px 0;gap:4px}
.tg{font-size:8px;font-weight:600;padding:1px 5px;border-radius:3px;min-width:24px;text-align:center;flex-shrink:0}
.va{text-align:right;flex:1;min-width:0}
.ve{text-align:right;min-width:48px;font-size:10px;flex-shrink:0}
.cat-revenue .rl{color:#4ecdc4;font-weight:600}
.cat-subtotal{border-top:2px solid #252530}
.cat-subtotal .rl{color:#f0f0f5;font-weight:600}
.cat-total{border-top:2px solid #4ecdc4;border-bottom:2px solid #4ecdc4;background:#0f0f18}
.cat-total .rl{color:#ffd43b;font-weight:700}
.cat-detail .rl{color:#555;font-size:10px;padding-left:6px}
.cat-detail .row{font-size:10px}
.wrap{background:#12121a;border-radius:8px;border:1px solid #252530;overflow:hidden}
.foot{margin-top:10px;font-size:8px;color:#333;text-align:center}
.grn{color:#51cf66!important}.red{color:#ff6b6b!important}.dim{color:#555!important}
</style>
</head>
<body>

<div style="padding:2px 2px 8px">
  <div style="font-size:15px;font-weight:700;color:#f0f0f5">SAUVAGEONNE MÉGÈVE</div>
  <div id="subtitle" style="font-size:10px;color:#555"></div>
</div>

<div class="kpi" id="kpis"></div>

<div class="c" style="margin-bottom:5px">
  <button class="b on" onclick="setMode('cumul')" id="m_cumul">Cumul</button>
  <button class="b" onclick="setMode('mensuel')" id="m_mensuel">Mois</button>
  <button class="b" onclick="setMode('total')" id="m_total">Total</button>
  <span style="flex:1"></span>
  <button class="b" onclick="setUnit('€')" id="u_eur">€</button>
  <button class="b on" onclick="setUnit('K€')" id="u_keur">K€</button>
  <button class="b" onclick="toggleDetail()" id="btn_det">▸</button>
</div>
<div class="c" style="margin-bottom:8px">
  <button class="b on" onclick="setCompare('all')" id="c_all">N / N-1 / Bdg</button>
  <button class="b" onclick="setCompare('n1')" id="c_n1">N vs N-1</button>
  <button class="b" onclick="setCompare('bdg')" id="c_bdg">N vs Budget</button>
</div>

<div class="slider" id="sliderWrap">
  <span style="color:#555;font-size:9px" id="sliderLabel">→</span>
  <input type="range" min="0" max="11" value="4" id="slider" oninput="setMonth(+this.value)">
  <span style="color:#4ecdc4;font-weight:700;font-size:14px;min-width:30px;text-align:right" id="monthLabel"></span>
</div>

<div class="wrap" id="rows"></div>
<div class="foot" id="foot"></div>

let mode="cumul",month=4,detail=false,unit="K€",compare="all";
const NR=D["N-1"].length;

function fm(v){if(!v)return"-";const a=Math.abs(Math.round(v)).toLocaleString("fr-FR");return v<0?"("+a+")":a}
function fk(v){if(!v)return"-";const a=Math.abs(Math.round(v/1000)).toLocaleString("fr-FR");return v<0?"("+a+")":a}
function fp(v){if(v==null||!isFinite(v))return"-";const a=Math.abs(v*100).toFixed(1)+"%";return v<0?"("+a+")":"+"+a}
function f(v){return unit==="K€"?fk(v):fm(v)}
function cum(a,m){let s=0;for(let i=0;i<=m;i++)s+=a[i];return s}
function gv(ds,ri){const r=D[ds]?.[ri];if(!r)return 0;return mode==="cumul"?cum(r.v,month):mode==="total"?r.v[12]:r.v[month]}
function pg(c){return c==="revenue"||c==="subtotal"||c==="total"}
function ec(d,c){if(Math.abs(d)<1)return"dim";return(pg(c)?d>0:d<0)?"grn":"red"}

function sel(pre,id,ids){ids.forEach(x=>{document.getElementById(pre+x).classList.toggle("on",x===id)})}

function setMode(m){mode=m;sel("m_",m,["cumul","mensuel","total"]);
  document.getElementById("sliderWrap").style.display=m==="total"?"none":"flex";
  document.getElementById("sliderLabel").textContent=m==="cumul"?"→":"";render()}
function setMonth(m){month=m;render()}
function setUnit(u){unit=u;sel("u_",u==="€"?"eur":"keur",["eur","keur"]);render()}
function setCompare(c){compare=c;sel("c_",c,["all","n1","bdg"]);render()}
function toggleDetail(){detail=!detail;document.getElementById("btn_det").textContent=detail?"▾":"▸";
  document.getElementById("btn_det").classList.toggle("on",detail);render()}

function render(){
  const am=mode==="total"?12:month;
  const pl=mode==="cumul"?"Nov → "+MO[month]:mode==="mensuel"?MO[month]:"Total exercice";
  document.getElementById("subtitle").textContent="P&L comparatif · "+pl;
  document.getElementById("monthLabel").textContent=MO[month];

  // KPIs
  const caN=gv("N",0),caN1=gv("N-1",0),caB=gv("Budget",0),mbN=gv("N",2);
  const eN=gv("N",20),eB=gv("Budget",20),rnN=gv("N",NR-1);
  const kpis=[
    {t:"CA (N)",v:fk(caN),s:caN1?("vs N-1: "+((caN/caN1-1)*100).toFixed(0)+"%"):"",c:"#4ecdc4"},
    {t:"Taux MB",v:caN?(mbN/caN*100).toFixed(1)+"%":"-",s:"MB: "+fk(mbN),c:"#74b9ff"},
    {t:"EBITDA (N)",v:fk(eN),s:"Bdg: "+fk(eB),c:eN>=eB?"#51cf66":"#ff6b6b"},
    {t:"RN (N)",v:fk(rnN),s:"",c:rnN>=0?"#51cf66":"#ff6b6b"}
  ];
  document.getElementById("kpis").innerHTML=kpis.map(k=>
    `<div class="k"><div class="kt">${k.t}</div><div class="kv" style="color:${k.c}">${k.v}</div>${k.s?`<div class="ks">${k.s}</div>`:""}</div>`
  ).join("");

  // Rows
  let h="";
  for(let i=0;i<NR;i++){
    const r=D["N-1"][i];
    if(!detail&&r.cat==="detail")continue;
    const vN1=gv("N-1",i),vN=gv("N",i),vB=gv("Budget",i);
    const dN1=vN-vN1,dB=vN-vB;
    const pN1=vN1?dN1/Math.abs(vN1):null,pB=vB?dB/Math.abs(vB):null;
    const eN1=ec(dN1,r.cat),eB2=ec(dB,r.cat);

    h+=`<div class="rw cat-${r.cat}"><div class="rl">${r.s}</div><div class="rv">`;
    if(compare==="all"){
      h+=`<div class="row"><span class="tg" style="background:#1e3a38;color:#4ecdc4">N</span><span class="va" style="color:#f0f0f5;font-weight:600">${f(vN)}</span></div>`;
      h+=`<div class="row"><span class="tg" style="background:#1a1a2a;color:#666">N-1</span><span class="va" style="color:#666">${f(vN1)}</span><span class="ve ${eN1}">${fp(pN1)}</span></div>`;
      h+=`<div class="row"><span class="tg" style="background:#2a2a1a;color:#ffa94d">B</span><span class="va" style="color:#666">${f(vB)}</span><span class="ve ${eB2}">${fp(pB)}</span></div>`;
    } else if(compare==="n1"){
      h+=`<div class="row"><span style="color:#666;flex:1">${f(vN1)}</span><span style="color:#f0f0f5;font-weight:600;flex:1;text-align:right">${f(vN)}</span><span class="ve ${eN1}" style="font-weight:500">${f(dN1)}</span><span class="ve ${eN1}">${fp(pN1)}</span></div>`;
    } else {
      h+=`<div class="row"><span style="color:#ffa94d;flex:1">${f(vB)}</span><span style="color:#f0f0f5;font-weight:600;flex:1;text-align:right">${f(vN)}</span><span class="ve ${eB2}" style="font-weight:500">${f(dB)}</span><span class="ve ${eB2}">${fp(pB)}</span></div>`;
    }
    h+=`</div></div>`;
  }
  document.getElementById("rows").innerHTML=h;
  document.getElementById("foot").textContent="N-1 retraité (dot. amort. & rés. fin.) · HT "+unit+" · Vert = favorable · Rouge = défavorable";
}

render();
</script>

</html>
